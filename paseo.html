<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paseo Virtual 360 - CDN</title>

  <!-- Pannellum CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0f1420;color:#eaf0ff}
    header{padding:14px 16px;background:#171f31;border-bottom:1px solid #273451}
    header h1{font-size:1.1rem;margin-bottom:4px}
    header p{font-size:.9rem;opacity:.85}
    main{display:grid;grid-template-columns:1fr 280px;height:calc(100vh - 72px)}
    #viewer{width:100%;height:100%;background:#000}
    .panel{border-left:1px solid #273451;background:#131a2a;padding:14px}
    .panel button{
      width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;
      background:#2e6bff;color:#fff;cursor:pointer;font-weight:700
    }
    .panel button:hover{background:#1f56d8}
    .panel hr{border:none;border-top:1px solid #273451;margin:12px 0}
    .panel ul{margin-left:18px;line-height:1.5;font-size:.92rem}
  </style>
</head>
<body>
  <header>
    <h1>Paseo Virtual 360 (CDN + imágenes online)</h1>
    <p>Demo para clase, sin backend</p>
  </header>

  <main>
    <section id="viewer"></section>

    <aside class="panel">
      <h2>Mapa rápido</h2>
      <button data-scene="entrada">📍 Escena 1</button>
      <button data-scene="pasillo">📍 Escena 2</button>
      <button data-scene="aula">📍 Escena 3</button>

      <hr/>
      <ul>
        <li>Arrastra para mirar alrededor.</li>
        <li>Usa rueda para zoom.</li>
        <li>Clic en hotspots para navegar.</li>
      </ul>
    </aside>
  </main>

  <script>
    const viewer = pannellum.viewer('viewer', {
      default: {
        firstScene: 'entrada',
        sceneFadeDuration: 900,
        autoLoad: true
      },
      scenes: {
        entrada: {
          title: 'Mason Circle',
          type: 'equirectangular',
          panorama: 'https://pannellum.org/images/from-tree.jpg',
          hotSpots: [
            { pitch: -2, yaw: 133, type: 'scene', text: 'Ir a Escena 2', sceneId: 'pasillo' },
            { pitch: 9, yaw: -45, type: 'info', text: 'Aqui va informacion para los visitantes' }
          ]
        },
        pasillo: {
          title: 'Spring House',
          type: 'equirectangular',
          panorama: 'https://pannellum.org/images/bma-0.jpg',
          hotSpots: [
            { pitch: -1, yaw: 37, type: 'scene', text: 'Ir a Escena 1', sceneId: 'entrada' },
            { pitch: -4, yaw: -75, type: 'scene', text: 'Ir a Escena 3', sceneId: 'aula' }
          ]
        },
        aula: {
          title: 'ALMA Observatory',
          type: 'equirectangular',
          panorama: 'https://pannellum.org/images/alma.jpg',
          hotSpots: [
            { pitch: -2, yaw: 90, type: 'scene', text: 'Volver a Escena 2', sceneId: 'pasillo' },
            { pitch: 14, yaw: 20, type: 'info', text: 'Antenas astronómicas' }
          ]
        }
      }
    });

    document.querySelectorAll('button[data-scene]').forEach(btn => {
      btn.addEventListener('click', () => viewer.loadScene(btn.dataset.scene));
    });
  </script>
</body>
</html>
